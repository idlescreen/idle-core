# cargo-deny configuration for the UberMetroid companion apps.
# Enforces supply-chain and license safety on all dependencies.

[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2026-0173", "RUSTSEC-2026-0192", "RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
]


confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[[licenses.clarify]]
name = "cosmic-config"
expression = "GPL-3.0-only"
license-files = []

[[licenses.clarify]]
name = "cosmic-config-derive"
expression = "GPL-3.0-only"
license-files = []

[[licenses.clarify]]
name = "cosmic-panel-config"
expression = "GPL-3.0-only"
license-files = []

[[licenses.clarify]]
name = "cosmic-settings-daemon"
expression = "GPL-3.0-only"
license-files = []

[[licenses.clarify]]
name = "cosmic-theme"
expression = "GPL-3.0-only"
license-files = []

[[licenses.clarify]]
name = "dnd"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "iced_accessibility"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "mime"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "xdg-shell-wrapper-config"
expression = "GPL-3.0-only"
license-files = []


[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/pop-os/libcosmic"]